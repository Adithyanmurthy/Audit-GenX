services:
  - type: web
    name: audit-genx
    runtime: python
    rootDir: PS5-AuditReady-AI
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    plan: free
    autoDeploy: true
